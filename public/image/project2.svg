<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a3a2f"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)"/>
  <!-- Todo list icon -->
  <g transform="translate(340,40)">
    <!-- Clipboard -->
    <rect x="0" y="15" width="120" height="130" rx="10" fill="none" stroke="#10b981" stroke-width="2.5"/>
    <rect x="35" y="5" width="50" height="20" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <!-- Checkboxes -->
    <rect x="20" y="45" width="18" height="18" rx="4" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="2"/>
    <polyline points="24,54 28,58 36,50" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="48" y="49" width="55" height="8" rx="4" fill="#10b981" fill-opacity="0.4"/>
    <rect x="20" y="75" width="18" height="18" rx="4" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="2"/>
    <polyline points="24,84 28,88 36,80" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="48" y="79" width="45" height="8" rx="4" fill="#10b981" fill-opacity="0.4"/>
    <rect x="20" y="105" width="18" height="18" rx="4" fill="none" stroke="#10b981" stroke-width="2"/>
    <rect x="48" y="109" width="50" height="8" rx="4" fill="#10b981" fill-opacity="0.25"/>
  </g>
  <!-- Chat bubble -->
  <g transform="translate(480,80)">
    <rect x="0" y="0" width="70" height="50" rx="12" fill="none" stroke="#06b6d4" stroke-width="2.5"/>
    <polygon points="15,50 25,65 35,50" fill="#0f172a" stroke="#06b6d4" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="15" y1="50" x2="35" y2="50" stroke="#0f172a" stroke-width="3"/>
    <circle cx="22" cy="25" r="4" fill="#06b6d4"/>
    <circle cx="35" cy="25" r="4" fill="#06b6d4"/>
    <circle cx="48" cy="25" r="4" fill="#06b6d4"/>
  </g>
  <!-- Title -->
  <text x="400" y="225" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="bold">Fullstack Todo App</text>
  <text x="400" y="260" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="bold">with Chatbot</text>
  <!-- Accent line -->
  <rect x="300" y="280" width="200" height="3" rx="2" fill="url(#accent2)"/>
  <!-- Tech tags -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#10b981">
    <rect x="235" y="300" width="80" height="28" rx="14" fill="#10b981" fill-opacity="0.15"/>
    <text x="275" y="319" text-anchor="middle">Next.js</text>
    <rect x="325" y="300" width="100" height="28" rx="14" fill="#10b981" fill-opacity="0.15"/>
    <text x="375" y="319" text-anchor="middle">TypeScript</text>
    <rect x="435" y="300" width="100" height="28" rx="14" fill="#10b981" fill-opacity="0.15"/>
    <text x="485" y="319" text-anchor="middle">Fullstack</text>
  </g>
</svg>