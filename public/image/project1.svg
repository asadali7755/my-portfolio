<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Robot icon -->
  <g transform="translate(400,120)" text-anchor="middle">
    <!-- Head -->
    <rect x="-30" y="-50" width="60" height="50" rx="8" fill="none" stroke="#06b6d4" stroke-width="2.5"/>
    <!-- Eyes -->
    <circle cx="-12" cy="-30" r="6" fill="#06b6d4"/>
    <circle cx="12" cy="-30" r="6" fill="#06b6d4"/>
    <!-- Antenna -->
    <line x1="0" y1="-50" x2="0" y2="-65" stroke="#06b6d4" stroke-width="2.5"/>
    <circle cx="0" cy="-68" r="4" fill="#8b5cf6"/>
    <!-- Body -->
    <rect x="-40" y="8" width="80" height="60" rx="8" fill="none" stroke="#06b6d4" stroke-width="2.5"/>
    <!-- Body detail -->
    <circle cx="0" cy="38" r="10" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Arms -->
    <line x1="-40" y1="20" x2="-60" y2="45" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="20" x2="60" y2="45" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Title -->
  <text x="400" y="230" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="bold">Physical AI</text>
  <text x="400" y="265" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="bold">Humanoid Robotics Book</text>
  <!-- Accent line -->
  <rect x="300" y="285" width="200" height="3" rx="2" fill="url(#accent)"/>
  <!-- Tech tags -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#06b6d4">
    <rect x="235" y="305" width="80" height="28" rx="14" fill="#06b6d4" fill-opacity="0.15"/>
    <text x="275" y="324" text-anchor="middle">Next.js</text>
    <rect x="325" y="305" width="100" height="28" rx="14" fill="#06b6d4" fill-opacity="0.15"/>
    <text x="375" y="324" text-anchor="middle">TypeScript</text>
    <rect x="435" y="305" width="110" height="28" rx="14" fill="#06b6d4" fill-opacity="0.15"/>
    <text x="490" y="324" text-anchor="middle">Tailwind CSS</text>
  </g>
</svg>